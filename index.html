        /**

        const apiKey = ""; // API Key disediakan secara otomatis oleh environment
        const modal = document.getElementById('ai-modal');
        const modalContent = document.getElementById('ai-modal-content');

        // Fungsi menampilkan modal
        function openModal() {
            modal.classList.remove('hidden');
            // Sedikit delay agar efek transisi CSS berjalan lancar
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
                modal.querySelector('div').classList.add('scale-100');
            }, 10);
        }

        // Fungsi menyembunyikan modal
        function closeModal() {
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.remove('scale-100');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Fungsi memanggil Gemini API
        async function generateAIMenu(nama, jabatan) {
            openModal();
            // Tampilkan animasi loading
            modalContent.innerHTML = `
                <div class="flex flex-col items-center justify-center py-12">
                    <div class="animate-spin rounded-full h-14 w-14 border-t-2 border-b-2 border-indigo-600 mb-4"></div>
                    <p class="text-slate-600 text-center font-medium animate-pulse">
                        ✨ AI sedang meracik resep bergizi<br>bersama <strong>${nama}</strong>...
                    </p>
                </div>
            `;

            // Prompt untuk menginstruksikan AI
            const prompt = `Buatkan 1 ide menu masakan super bergizi dan murah meriah yang direkomendasikan secara khusus oleh ${nama} (${jabatan}) untuk program pengentasan stunting balita di Medan. Sertakan: 1. Nama menu yang menarik, 2. Daftar bahan lokal (Medan/Sumut) yang murah dan mudah didapat, 3. Cara pembuatan singkat.`;
            
            // Instruksi sistem agar hasil AI berupa HTML siap pakai
            const systemPrompt = "Anda adalah asisten ahli gizi profesional. Jawablah SELALU menggunakan format HTML murni (gunakan tag <h3>, <p>, <ul>, <li>, <strong>) agar langsung rapi saat dirender di website. Jangan gunakan format Markdown (seperti ** atau *). Gunakan bahasa Indonesia yang hangat, ramah, dan memotivasi khas budaya Medan.";

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                if (!response.ok) throw new Error('Gagal menghubungi server AI');

                const data = await response.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (aiText) {
                    modalContent.innerHTML = aiText;
                } else {
                    throw new Error('Respons AI kosong');
                }
            } catch (error) {
                console.error("Gemini API Error:", error);
                modalContent.innerHTML = `
                    <div class="text-center py-8 text-red-500 flex flex-col items-center">
                        <i data-lucide="triangle-alert" class="w-16 h-16 mb-4"></i>
                        <p class="font-bold text-lg">Mohon maaf, layanan AI sedang sibuk.</p>
                        <p class="text-slate-600 mt-2">Silakan tutup jendela ini dan coba lagi beberapa saat lagi.</p>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        // Fungsi fetch tangguh dengan mekanisme coba-lagi otomatis (Exponential Backoff)
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (i === retries - 1) throw new Error(`Request failed with status ${response.status}`);
                } catch (err) {
                    if (i === retries - 1) throw err;
                }
                // Tunggu sebelum mencoba lagi
                await new Promise(res => setTimeout(res, delays[i]));
            }
        }
